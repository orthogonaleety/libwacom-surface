on:
  push:
    tags:
      - v[0-9]+.*
      - testing-ci.*
  workflow_dispatch:

name: Build Packages

jobs:
  build-deb:
    name: Debian
    runs-on: ubuntu-latest
    container: ubuntu:22.04

    steps:
    - name: Install build dependencies
      run: |
        echo 'debconf debconf/frontend select Noninteractive' | debconf-set-selections
        sed 's/^deb /deb-src /' /etc/apt/sources.list >> /etc/apt/sources.list
        apt-get -q -y update
        apt-get -q -y install build-essential debhelper debsigs fakeroot wget git meson \
            python3-pyudev python3-pytest python3-libevdev ninja-build patch gpg cmake \
            libevdev-dev
        apt-get -q -y build-dep libwacom libwacom-dev

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build package
      run: |
        # Import GPG keys for libwacom/Peter Hutterer
        gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys 3C2C43D9447D5938EF4551EBE23B7E70B467F0BF || true
        gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys 594ABBA066118C7A02D10A80A8AF906D9307FBAD || true

        # Set as safe directory for git
        git config --global --add safe.directory "$PWD"

        # Build packages using dpkg-buildpackage
        ./pkg/deb/makedeb

    - name: Sign packages
      env:
        GPG_KEY_ID: 56C464BAAC421453
        GPG_KEY: ${{ secrets.LINUX_SURFACE_GPG_KEY }}
      run: |
        if [ -z "$GPG_KEY" ]; then
          echo "GPG_KEY not set — skipping signing; packages will be uploaded unsigned"
          exit 0
        fi

        cd pkg/deb

        # import GPG key
        echo "$GPG_KEY" | base64 -d | gpg --import --no-tty --batch --yes
        export GPG_TTY=$(tty)

        # sign packages
        for deb in *.deb; do
          debsigs --sign=origin -k $GPG_KEY_ID "$deb"
        done

    - name: Prepare release
      run: |
        mkdir release
        rm -f ./pkg/deb/*-dbgsym_*.ddeb || true
        mv ./pkg/deb/*.deb release

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: debian-latest
        path: release

  build-f44:
    name: Build Fedora 44 package
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:44
      options: --security-opt seccomp=unconfined
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        dnf distro-sync -y
        dnf install -y make rpmdevtools rpm-sign 'dnf-command(builddep)'
        dnf builddep -y pkg/fedora/libwacom-surface.spec

    - name: Build package
      run: |
        cd pkg/fedora

        # Build the .rpm packages
        ./makerpm

    - name: Sign packages
      env:
        GPG_KEY_ID: 56C464BAAC421453
        GPG_KEY: ${{ secrets.LINUX_SURFACE_GPG_KEY }}
      run: |
        if [ -z "$GPG_KEY" ]; then
          echo "GPG_KEY not set — skipping signing; packages will be uploaded unsigned"
          exit 0
        fi

        cd pkg/fedora/out

        # import GPG key
        echo "$GPG_KEY" | base64 -d | gpg --import --no-tty --batch --yes

        # sign package
        cd noarch
        rpm --resign *.rpm --define "_gpg_name $GPG_KEY_ID"

        cd ..

        cd x86_64
        rpm --resign *.rpm --define "_gpg_name $GPG_KEY_ID"

    - name: Prepare artifacts
      run: |
        cd pkg/fedora
        mkdir release

        cp out/noarch/* release/
        cp out/x86_64/* release/

        rm release/libwacom-surface-devel-*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: fedora-44-latest
        path: pkg/fedora/release

  build-f43:
    name: Build Fedora 43 package
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --security-opt seccomp=unconfined
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        dnf distro-sync -y
        dnf install -y make rpmdevtools rpm-sign 'dnf-command(builddep)'
        dnf builddep -y pkg/fedora/libwacom-surface.spec

    - name: Build package
      run: |
        cd pkg/fedora

        # Build the .rpm packages
        ./makerpm

    - name: Sign packages
      env:
        GPG_KEY_ID: 56C464BAAC421453
        GPG_KEY: ${{ secrets.LINUX_SURFACE_GPG_KEY }}
      run: |
        if [ -z "$GPG_KEY" ]; then
          echo "GPG_KEY not set — skipping signing; packages will be uploaded unsigned"
          exit 0
        fi

        cd pkg/fedora/out

        # import GPG key
        echo "$GPG_KEY" | base64 -d | gpg --import --no-tty --batch --yes

        # sign package
        cd noarch
        rpm --resign *.rpm --define "_gpg_name $GPG_KEY_ID"

        cd ..

        cd x86_64
        rpm --resign *.rpm --define "_gpg_name $GPG_KEY_ID"

    - name: Prepare artifacts
      run: |
        cd pkg/fedora
        mkdir release

        cp out/noarch/* release/
        cp out/x86_64/* release/

        rm release/libwacom-surface-devel-*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: fedora-43-latest
        path: pkg/fedora/release
